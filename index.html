<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Simple to-do list app built with HTML, CSS and JavaScript.">
        <meta name="author" content="Bibiána Hlavatíková">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Dancing+Script:wght@400..700&family=Pacifico&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Mono:wght@400..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <title>TO-DO list</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    </head>

    <body>

        <header>
            <button class="langBtn" type="button" id="lang-en" aria-label="Switch to English">EN</button>
            <button class="langBtn" type="button" id="lang-sk" aria-label="Switch to Slovak">SK</button>
        </header>
       
        <main>

        <h1>TO DO list</h1>

        <form id="task-form">
            <input id="task-input" class="input-task" type="text" placeholder= "Type a task..." data-i18n-placeholder="namePlaceholder" aria-label="Task input" required>
            <button type="submit" class="addBtn" data-i18n="addTask">Add task</button>
        </form>


        <div class="todolist">
            <div class="list-controls">
                <nav class="filters" aria-label="Task-filters">
                    <button id="all" class="filterBtn" data-i18n="filterAll">All</button>
                    <button id="done" class="filterBtn" data-i18n="filterDone">Done</button>
                    <button id="todo" class="filterBtn" data-i18n="filterTodo">To do</button>
                </nav>
                <div class="font-selector-container">
                    <select  class="font-select" id="font-select" aria-label="Font style selector">
                    </select>
                </div>
            </div> 
             <p id="counter" class="counter"></p>
            <ul id="task-list"></ul>
        </div>

        </main>

        <footer>
            <p>© 2026 Bibiána Hlavatíková</p>
        </footer>

        <script src="script.js"></script>

    </body>
</html>
