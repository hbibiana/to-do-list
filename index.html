<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Simple to-do list app built with HTML, CSS and JavaScript.">
        <meta name="author" content="Bibiána Hlavatíková">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Betania+Patmos&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+CZ:wght@100..400&display=swap" rel="stylesheet">
        <title>TO-DO list</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    </head>

    <body>
        <header>
            <button class="lang" type="button" id="lang-en">EN</button>
            <button class="lang" type="button" id="lang-sk">SK</button>
        </header>
       
        <main>

        <h1>TO DO list</h1>

        <form id="task-form">
            <input id="task-input" type="text" placeholder= "Type a task..." data-i18n-placeholder="namePlaceholder" aria-label="Task input">
            <button type="submit" class="add" data-i18n="addTask">Add task</button>
        </form>

        <nav class="filters" aria-label="Task-filters">
            <button id="all" data-i18n="filterAll">All tasks</button>
            <button id="done" data-i18n="filterDone">Completed tasks</button>
            <button id="todo" data-i18n="filterTodo">Unfinished tasks</button>
        </nav>
        
        <div class="todolist">
            <p id="counter"></p>
            <ul id="task-list"></ul>
        </div>

        </main>
        <script src="script.js"></script>

    </body>
</html>
